<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SomaAgent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: white;
            color: #000;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px;
            gap: 30px;
        }

        /* Main Section */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #000;
        }

        .btn-capture {
            padding: 16px 64px;
            background: #000;
            border: 2px solid #000;
            color: white;
            font-family: 'Monaco', monospace;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-capture:hover:not(:disabled) {
            background: white;
            color: #000;
        }

        .btn-capture:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Terminal Section */
        .terminal {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 0;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-line {
            margin: 2px 0;
            word-break: break-all;
        }

        /* Result Section (hidden by default) */
        .result {
            display: none;
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 0;
            text-align: center;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #000;
        }

        .result-data {
            text-align: left;
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            margin: 10px 0;
            font-size: 11px;
            line-height: 1.8;
        }

        .result-link {
            color: #0066cc;
            text-decoration: none;
            word-break: break-all;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        /* Scrollbar */
        .terminal::-webkit-scrollbar {
            width: 6px;
        }

        .terminal::-webkit-scrollbar-track {
            background: #f5f5f5;
        }

        .terminal::-webkit-scrollbar-thumb {
            background: #ccc;
        }

        .terminal::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* Duration input */
        .duration-section {
            text-align: center;
            margin-bottom: 10px;
        }

        .duration-input {
            width: 50px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            text-align: center;
        }

        .duration-input:focus {
            outline: none;
            border-color: #000;
        }

        .label {
            margin-right: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Section -->
        <div class="main">
            <div class="logo">⬢ SomaAgent</div>
            
            <div class="duration-section">
                <label class="label">Duration:</label>
                <input type="number" id="duration" class="duration-input" value="15" min="5" max="60">
                <span style="font-size: 12px; color: #666;">seconds</span>
            </div>
            
            <button class="btn-capture" id="captureBtn" onclick="startCapture()">Start Capture</button>
            
            <div class="status" id="status">Ready</div>
        </div>

        <!-- Terminal Section -->
        <div class="terminal" id="terminal"></div>

        <!-- Result Section -->
        <div class="result" id="result">
            <div class="result-title">✅ Motion Captured & NFT Minted</div>
            <div class="result-data" id="resultData"></div>
        </div>

        <div class="status" style="text-align:center; margin-top:20px; font-size:11px; color:#444;">
            ©2026 Petra. All rights reserved.
        </div>
    </div>

    <script>
        let pollingActive = false;
        let pollInterval = null;
        let allLogs = [];
        let lastSessionData = null; // cache final session payload
        const MAX_LOGS = 500;

        async function pollLogs() {
            try {
                const res = await fetch('/api/agent/logs');
                if (!res.ok) return;
                
                const data = await res.json();
                const logs = data.real_time || [];
                
                if (logs.length === 0) return;

                allLogs = logs.slice(-MAX_LOGS);
                renderTerminal();
                
            } catch (e) {
                console.error('Poll error:', e);
            }
        }

        function renderTerminal() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = allLogs.map(log => {
                let className = 'log-line';
                return `<div class="${className}">${escapeHtml(log)}</div>`;
            }).join('');
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function pollSession() {
            try {
                const res = await fetch('/api/agent/session');
                if (!res.ok) return;
                
                const session = await res.json();
                lastSessionData = session.data || null;
                const statusEl = document.getElementById('status');

                if (session.status === 'running') {
                    statusEl.textContent = `● Running... ${Math.floor(session.elapsed || 0)}s`;
                } else if (session.status === 'complete') {
                    statusEl.textContent = '✅ Complete';
                    showResults(session);
                    stopPolling();
                } else if (session.status === 'error') {
                    statusEl.textContent = '✗ Error';
                    stopPolling();
                }
            } catch (e) {
                console.error('Session poll error:', e);
            }
        }

        function showResults(session = null) {
            const resultData = document.getElementById('resultData');
            let html = '';

            // Prefer session payload
            const data = (session && session.data) || lastSessionData || {};
            const txHashFromSession = data.tx_hash || '';
            const sepoliaUrlFromSession = data.tx_url || (data.tx_hash ? `https://sepolia.etherscan.io/tx/${data.tx_hash}` : '');

            // Extract from logs as fallback
            const txMatch = allLogs.find(log => log.includes('TX SENT:'));
            const sepoliaMatch = allLogs.find(log => log.includes('View on Sepolia:'));

            const txHash = txHashFromSession || (txMatch ? (txMatch.match(/TX SENT: (0x?[A-Fa-f0-9]+)/) || [])[1] : '');
            const sepoliaUrl = sepoliaUrlFromSession || (sepoliaMatch ? (sepoliaMatch.match(/(https:\/\/[^\s]+)/) || [])[1] : '');

            if (txHash) {
                html += `<strong>Transaction Hash:</strong><br/>${txHash}<br/><br/>`;
            }
            if (sepoliaUrl) {
                html += `<strong>View on Sepolia:</strong><br/>
                        <a href="${sepoliaUrl}" target="_blank" class="result-link">${sepoliaUrl}</a>`;
            }

            if (html === '') {
                html = 'No transaction data available yet.';
            }

            resultData.innerHTML = html;
            document.getElementById('result').classList.add('show');
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function startPolling(duration) {
            if (pollingActive) return;
            pollingActive = true;
            
            allLogs = [];
            pollInterval = setInterval(async () => {
                await pollSession();
                await pollLogs();
            }, 500);

            renderTerminal();
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            pollingActive = false;
            document.getElementById('captureBtn').disabled = false;
        }

        async function startCapture() {
            const duration = parseInt(document.getElementById('duration').value);
            const btn = document.getElementById('captureBtn');
            
            btn.disabled = true;
            allLogs = [];
            lastSessionData = null;
            document.getElementById('result').classList.remove('show');
            document.getElementById('terminal').innerHTML = '<div class="log-line">Starting...</div>';
            
            try {
                const res = await fetch('/api/agent/start-capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duration })
                });
                
                if (!res.ok) throw new Error(`Start failed: ${res.status}`);
                
                startPolling(duration);
                document.getElementById('status').textContent = `● Starting...`;
                
            } catch (e) {
                console.error('Capture error:', e);
                document.getElementById('status').textContent = `✗ Error: ${e.message}`;
                btn.disabled = false;
            }
        }

        // Initial setup
        renderTerminal();
    </script>
</body>
</html>
