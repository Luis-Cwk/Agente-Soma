<script>
// ─── ERC-8004 hash chain (localStorage) ───────────────────────────────────
function sha256(str) {
    const buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(b => {
        return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
    });
}

function getPrevHash() {
    return localStorage.getItem('soma_prev_hash') || '0'.repeat(64);
}

async function buildERC8004Entry(sessionId, dominant, confidence, labanScores, nftTitle, txHash) {
    const prevHash = getPrevHash();
    const entry = {
        schema: 'ERC-8004-v1',
        agent: {
            name: 'SomaAgent',
            version: '2.0.0',
            team_id: '874d2679adae49f39a2812e6a66701c6',
            registration_tx: '0x76b7f88db606c6a6cba0fbd4ed7ee7f36b916587a138b9a518e368d4a66993c0'
        },
        session: { id: sessionId, pipeline: 'perception → reasoning → log → publish' },
        prev_log_hash: prevHash,
        entries: [
            {
                step: 1, node: 'perception', action: 'motion_capture',
                output: { dominant_movement: dominant, confidence: Math.round(confidence * 1000) / 1000 },
                decision: `Detected '${dominant}' as primary movement quality`
            },
            {
                step: 2, node: 'reasoning', action: 'artistic_decision',
                output: { nft_title: nftTitle },
                decision: 'Agent decided to create NFT artwork based on movement'
            },
            {
                step: 3, node: 'log', action: 'hash_chain',
                output: { prev_hash: prevHash }
            },
            {
                step: 4, node: 'publish', action: 'blockchain_mint',
                output: { tx_hash: txHash }
            }
        ]
    };
    const logHash = await sha256(JSON.stringify(entry));
    entry.log_hash = logHash;
    localStorage.setItem('soma_prev_hash', logHash);
    return { entry, logHash, prevHash };
}

// ─── Laban classifier ─────────────────────────────────────────────────────
const LABAN_MOVEMENTS = ['golpear','flotar','deslizar','cortar','presionar','retorcer','sacudir','tocar'];

// ─── Visual Effects (Enhanced from Kori) ──────────────────────────────────
let particles = [];
let glowEffects = [];
let grids = [];
let bodyPoints = [];
let currentLandmarks = [];
let bodyContourPoints = [];

class GlowEffect {
    constructor(x, y, color = '#00ff00') {
        this.x = x;
        this.y = y;
        this.intensity = 1.0;
        this.decay = 0.05;
        this.color = color;
        this.size = 8;
    }
    
    update() {
        this.intensity -= this.decay;
        return this.intensity > 0;
    }
    
    draw(ctx) {
        ctx.save();
        for (let i = 0; i < 4; i++) {
            const size = this.size * (1 - i * 0.25);
            const alpha = this.intensity * (100 - i * 25);
            ctx.fillStyle = `rgba(0,255,0,${alpha / 255})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.decay = 0.02;
        this.color = color;
        this.size = 2 + Math.random() * 4;
    }
    
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life -= this.decay;
        return this.life > 0;
    }
    
    draw(ctx) {
        ctx.save();
        ctx.fillStyle = `rgba(100,200,255,${this.life})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class FallingGrid {
    constructor() {
        this.x = Math.random() * 640;
        this.y = -100 - Math.random() * 200;
        this.speed = 1 + Math.random() * 2;
        this.size = 20 + Math.random() * 50;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
    }
    
    update() {
        this.y += this.speed;
        this.rotation += this.rotationSpeed;
        return this.y < 480 + 100;
    }
    
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.strokeStyle = 'rgba(100,200,255,0.3)';
        ctx.lineWidth = 2;
        for (let i = 1; i <= 5; i++) {
            ctx.beginPath();
            ctx.arc(0, 0, (this.size / 2.5) * i, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.restore();
    }
}

function spawnParticles(x, y, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, `hsl(${Math.random() * 60 + 180}, 80%, 50%)`));
    }
}

function spawnGlow(x, y) {
    glowEffects.push(new GlowEffect(x, y, '#00ff88'));
}

function drawBodyContour(ctx, landmarks) {
    if (!landmarks || landmarks.length === 0) return;
    
    // Define skeleton connections
    const connections = [
        [0, 1], [0, 4], [1, 2], [2, 3], [1, 5], [5, 6], [6, 7],
        [0, 9], [9, 10], [10, 11], [0, 13], [13, 14], [14, 15],
        [5, 9], [12, 11], [8, 14], [7, 15]
    ];
    
    ctx.save();
    ctx.strokeStyle = 'rgba(100,200,255,0.8)';
    ctx.lineWidth = 2;
    
    for (const [a, b] of connections) {
        if (landmarks[a] && landmarks[b]) {
            ctx.beginPath();
            ctx.moveTo(landmarks[a].x, landmarks[a].y);
            ctx.lineTo(landmarks[b].x, landmarks[b].y);
            ctx.stroke();
        }
    }
    ctx.restore();
}

function drawBodyPoints(ctx, landmarks) {
    if (!landmarks) return;
    ctx.save();
    for (const lm of landmarks) {
        if (!lm) continue;
        // Glow circles
        for (let i = 3; i > 0; i--) {
            ctx.fillStyle = `rgba(100,200,255,${14 / i})`;
            ctx.beginPath();
            ctx.arc(lm.x, lm.y, i * 6, 0, Math.PI * 2);
            ctx.fill();
        }
        // Center point
        ctx.shadowBlur = 12;
        ctx.shadowColor = 'rgba(100,200,255,0.6)';
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(lm.x, lm.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.restore();
}

function classifyLaban(landmarks) {
    if (!landmarks || landmarks.length < 33) {
        return { dominant: 'sacudir', scores: Object.fromEntries(LABAN_MOVEMENTS.map(m => [m, Math.random()])) };
    }

    // Shoulders, hips, wrists, elbows
    const lShoulder = landmarks[11], rShoulder = landmarks[12];
    const lHip = landmarks[23], rHip = landmarks[24];
    const lWrist = landmarks[15], rWrist = landmarks[16];
    const lElbow = landmarks[13], rElbow = landmarks[14];

    // Derived metrics
    const shoulderWidth = Math.abs(lShoulder.x - rShoulder.x);
    const hipWidth = Math.abs(lHip.x - rHip.x);
    const lArmH = Math.abs(lWrist.y - lShoulder.y);
    const rArmH = Math.abs(rWrist.y - rShoulder.y);
    const avgArmH = (lArmH + rArmH) / 2;
    const armSpread = Math.abs(lWrist.x - rWrist.x);
    const lElbowAngle = Math.abs(lWrist.y - lElbow.y);
    const rElbowAngle = Math.abs(rWrist.y - rElbow.y);

    const scores = {
        golpear:   Math.min(1, avgArmH * 2.5 + (1 - armSpread) * 0.5),
        flotar:    Math.min(1, armSpread * 1.8 + (1 - avgArmH) * 0.6),
        deslizar:  Math.min(1, shoulderWidth * 1.5 + lElbowAngle * 0.8),
        cortar:    Math.min(1, (armSpread + avgArmH) * 0.9),
        presionar: Math.min(1, (1 - avgArmH) * 1.6 + hipWidth * 0.7),
        retorcer:  Math.min(1, Math.abs(lShoulder.x - lHip.x) * 2.5),
        sacudir:   Math.min(1, Math.abs(lWrist.x - rWrist.x) * 1.2 + rElbowAngle * 0.6),
        tocar:     Math.min(1, (1 - armSpread) * 1.4 + avgArmH * 0.5)
    };

    // Normalize
    const total = Object.values(scores).reduce((a,b) => a+b, 0) || 1;
    Object.keys(scores).forEach(k => scores[k] = Math.round(scores[k] / total * 1000) / 1000);

    const dominant = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
    return { dominant, scores };
}

// ─── NFT metadata mapping ─────────────────────────────────────────────────
const NFT_MAP = {
    golpear:   { title: 'Crimson Impact, Bound',   emotion: 'fury',      keywords: ['explosive','crimson','geometry'] },
    flotar:    { title: 'Ethereal Drift',           emotion: 'peace',     keywords: ['ethereal','lavender','particles'] },
    deslizar:  { title: 'Metallic Glide',           emotion: 'serenity',  keywords: ['metallic','curves','ice'] },
    cortar:    { title: 'Brutalist Edge',           emotion: 'tension',   keywords: ['brutalist','monochrome','sharp'] },
    presionar: { title: 'Tectonic Weight',          emotion: 'power',     keywords: ['tectonic','obsidian','pressure'] },
    retorcer:  { title: 'Bioluminescent Spiral',    emotion: 'mystery',   keywords: ['bioluminescent','spiral','organic'] },
    sacudir:   { title: 'Trembling Energy',         emotion: 'dynamic',   keywords: ['vibration','kinetic','neon'] },
    tocar:     { title: 'Ink Pointillism',          emotion: 'curiosity', keywords: ['pointillism','ink','delicate'] }
};

// ─── State ────────────────────────────────────────────────────────────────
let capturing = false;
let frameBuffer = [];
let captureTimer = null;
let poseInstance = null;
let cameraInstance = null;
let logs = [];

function log(msg, cls = '') {
    logs.push({ msg, cls });
    renderTerminal();
}

function renderTerminal() {
    const t = document.getElementById('terminal');
    t.innerHTML = logs.slice(-200).map(l =>
        `<div class="log-line ${l.cls}">${escapeHtml(l.msg)}</div>`
    ).join('');
    t.scrollTop = t.scrollHeight;
}

function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
}

function uid() {
    return 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// ─── Main capture flow ───────────────────────────────────────────────────
async function startCapture() {
    if (capturing) return;

    const duration = parseInt(document.getElementById('duration').value) || 15;
    const btn = document.getElementById('captureBtn');
    btn.disabled = true;
    capturing = true;
    logs = [];
    frameBuffer = [];
    particles = [];
    glowEffects = [];
    grids = [];
    currentLandmarks = [];
    document.getElementById('result').classList.remove('show');
    document.getElementById('status').textContent = '● Starting...';

    log('[SomaAgent] Initializing capture pipeline...');
    log(`[SomaAgent] Session duration: ${duration}s`);

    // Show camera preview
    const videoWrap = document.getElementById('videoWrap');
    const videoEl = document.getElementById('videoEl');
    const canvasEl = document.getElementById('canvasEl');
    const ctx = canvasEl.getContext('2d');
    videoWrap.style.display = 'block';

    // Request camera
    let stream;
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        videoEl.srcObject = stream;
        await new Promise(r => videoEl.onloadedmetadata = r);
        canvasEl.width = videoEl.videoWidth;
        canvasEl.height = videoEl.videoHeight;
        log('[perception] Camera stream active ✓', 'log-ok');
    } catch (e) {
        log(`[perception] Camera error: ${e.message}`, 'log-err');
        log('[perception] Switching to dry-run mode (synthetic data)', 'log-ok');
        // dry-run: skip mediapipe, use synthetic frames
        await runDryRun(duration, btn, videoWrap, stream);
        return;
    }

    // Init MediaPipe Pose
    log('[perception] Loading MediaPipe Pose...');
    document.getElementById('status').textContent = '● Loading AI model...';

    try {
        poseInstance = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        poseInstance.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        poseInstance.onResults(onPoseResults);
        await poseInstance.initialize();
        log('[perception] MediaPipe Pose loaded (33 landmarks) ✓', 'log-ok');
    } catch(e) {
        log(`[perception] MediaPipe unavailable: ${e.message}`, 'log-err');
        log('[perception] Switching to dry-run mode', 'log-ok');
        await runDryRun(duration, btn, videoWrap, stream);
        return;
    }

    // Start camera loop
    document.getElementById('status').textContent = `● Capturing... (${duration}s)`;
    log(`[perception] Recording movement for ${duration}s — move naturally`);

    let elapsed = 0;
    const interval = setInterval(() => {
        elapsed++;
        document.getElementById('status').textContent = `● Capturing... (${elapsed}/${duration}s)`;
        if (elapsed < duration) {
            log(`[perception] Frame ${elapsed * 30} — analyzing landmarks...`);
        }
    }, 1000);

    cameraInstance = new Camera(videoEl, {
        onFrame: async () => {
            if (!capturing) return;
            await poseInstance.send({ image: videoEl });
            // draw skeleton on canvas
        },
        width: 640, height: 480
    });
    await cameraInstance.start();

    // Wait for duration
    await new Promise(r => setTimeout(r, duration * 1000));
    clearInterval(interval);

    // Stop
    capturing = false;
    if (cameraInstance) { await cameraInstance.stop(); cameraInstance = null; }
    if (stream) stream.getTracks().forEach(t => t.stop());
    videoWrap.style.display = 'none';

    await processFrames(duration, btn);
}

function onPoseResults(results) {
    if (!capturing || !results.poseLandmarks) return;
    frameBuffer.push([...results.poseLandmarks]);

    // Store landmarks for effect generation
    currentLandmarks = results.poseLandmarks;

    // Canvas drawing
    const canvasEl = document.getElementById('canvasEl');
    const ctx = canvasEl.getContext('2d');
    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

    // ─── Visual Effects Enhanced ───────────────────────────────────────
    
    // Update & draw falling grids
    grids = grids.filter(g => g.update());
    if (Math.random() < 0.15) {
        grids.push(new FallingGrid());
    }
    grids.forEach(g => g.draw(ctx));

    // Update & draw particles
    particles = particles.filter(p => p.update());
    particles.forEach(p => p.draw(ctx));

    // Update & draw glow effects
    glowEffects = glowEffects.filter(g => g.update());
    glowEffects.forEach(g => g.draw(ctx));

    // ─── Skeleton with Enhanced Visuals ──────────────────────────────
    
    // Draw body contour (connecting skeleton)
    drawBodyContour(ctx, results.poseLandmarks);
    
    // Draw body points with glow
    drawBodyPoints(ctx, results.poseLandmarks);
    
    // Draw connections (MediaPipe style but with colors)
    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
    ctx.lineWidth = 1.5;
    for (const [a, b] of POSE_CONNECTIONS) {
        if (results.poseLandmarks[a] && results.poseLandmarks[b]) {
            const lmA = results.poseLandmarks[a];
            const lmB = results.poseLandmarks[b];
            ctx.beginPath();
            ctx.moveTo(lmA.x, lmA.y);
            ctx.lineTo(lmB.x, lmB.y);
            ctx.stroke();
        }
    }

    // Generate particles & glow on significant movement
    if (Math.random() < 0.3) {
        const randomLm = results.poseLandmarks[Math.floor(Math.random() * results.poseLandmarks.length)];
        if (randomLm) {
            spawnParticles(randomLm.x, randomLm.y, 2);
            if (Math.random() < 0.5) spawnGlow(randomLm.x, randomLm.y);
        }
    }
}

async function runDryRun(duration, btn, videoWrap, stream) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    videoWrap.style.display = 'none';
    log('[perception] Dry-run: generating synthetic landmark data');

    for (let i = 0; i < duration; i++) {
        await new Promise(r => setTimeout(r, 1000));
        document.getElementById('status').textContent = `● Dry-run... (${i+1}/${duration}s)`;
        log(`[perception] Synthetic frame ${i * 30} — OK`);
    }

    // Push synthetic frames
    frameBuffer = Array.from({ length: 15 }, () =>
        Array.from({ length: 33 }, () => ({
            x: Math.random(), y: Math.random(), z: Math.random() * 0.1, visibility: 0.9
        }))
    );

    await processFrames(duration, btn);
}

async function processFrames(duration, btn) {
    const sessionId = uid();
    log('');
    log('[SomaAgent] ── Analysis Pipeline ──', 'log-bold');

    // 1. Classify Laban
    log('[reasoning] Classifying Laban effort qualities...');
    await sleep(600);

    const avgLandmarks = frameBuffer.length > 0
        ? frameBuffer[Math.floor(frameBuffer.length / 2)]
        : null;

    const { dominant, scores } = classifyLaban(avgLandmarks);
    const confidence = scores[dominant];
    const nft = NFT_MAP[dominant] || NFT_MAP.sacudir;

    log(`[reasoning] Dominant movement: ${dominant} (confidence: ${confidence.toFixed(3)})`, 'log-ok');
    log(`[reasoning] Laban scores: ${Object.entries(scores).slice(0,4).map(([k,v]) => `${k}=${v}`).join(' ')}`);
    await sleep(400);

    // 2. LLM (try API, fallback to local)
    log('[reasoning] Calling LLM for artistic interpretation...');
    await sleep(800);

    let nftTitle = nft.title;
    let description = `${dominant.charAt(0).toUpperCase() + dominant.slice(1)} movement expressing ${nft.emotion}. Generated by SomaAgent.`;

    try {
        const resp = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ movement: dominant, scores, confidence })
        });
        if (resp.ok) {
            const data = await resp.json();
            nftTitle = data.nft_title || nftTitle;
            description = data.description || description;
            log(`[reasoning] LLM response: "${nftTitle}"`, 'log-ok');
        } else {
            throw new Error('API unavailable');
        }
    } catch(e) {
        log(`[reasoning] LLM fallback — using local metadata`, 'log-ok');
        log(`[reasoning] NFT title: "${nftTitle}"`);
    }

    await sleep(400);

    // 3. ERC-8004 hash chain
    log('[log] Building ERC-8004 hash chain entry...');
    const prevHash = getPrevHash();
    const fakeTxHash = '0x' + Array.from({length: 64}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
    const { logHash } = await buildERC8004Entry(sessionId, dominant, confidence, scores, nftTitle, fakeTxHash);

    log(`[log] prev_hash: ${prevHash.slice(0,16)}...`, 'log-hash');
    log(`[log] log_hash:  ${logHash.slice(0,16)}...`, 'log-hash');
    log('[log] ERC-8004-v1 entry recorded ✓', 'log-ok');
    await sleep(400);

    log('');
    log('[SomaAgent] ✅ Pipeline complete', 'log-ok');
    document.getElementById('status').textContent = '✅ Complete - Publishing NFT...';

    // Call publish endpoint to get real IPFS/NFT URLs
    let publishResult = null;
    try {
        const pubResp = await fetch('/api/agent/publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                nft_title: nftTitle,
                nft_description: description,
                dominant_movement: dominant,
                movement_confidence: confidence,
                emotion_tag: nft.emotion,
                visual_keywords: nft.keywords,
                laban_scores: scores,
                log_hash: logHash,
                prev_log_hash: prevHash
            })
        });
        if (pubResp.ok) {
            publishResult = await pubResp.json();
            console.log('Publish result:', publishResult);
        } else {
            console.error('Publish failed:', pubResp.status);
        }
    } catch(e) {
        console.error('Publish error:', e);
    }

    // Show results
    let resultsHtml = `
        <strong>NFT Title:</strong> ${escapeHtml(nftTitle)}<br>
        <strong>Movement:</strong> ${dominant} (${(confidence*100).toFixed(1)}% confidence)<br>
        <strong>Keywords:</strong> ${nft.keywords.join(', ')}<br>
        <strong>Emotion:</strong> ${nft.emotion}<br><br>
        <strong>ERC-8004 log_hash:</strong><br>${logHash}
    `;

    if (publishResult && publishResult.status !== 'error') {
        console.log('✅ Publish success:', publishResult);
        if (publishResult.ipfs_gateway_url) {
            resultsHtml += `<br><strong>IPFS:</strong><br><a href="${publishResult.ipfs_gateway_url}" target="_blank" class="result-link">${publishResult.ipfs_gateway_url}</a>`;
        }
        if (publishResult.tx_hash) {
            resultsHtml += `<br><br><strong>Transaction Hash:</strong><br>${publishResult.tx_hash}`;
        }
        if (publishResult.tx_url) {
            resultsHtml += `<br><br><strong>View on Sepolia:</strong><br><a href="${publishResult.tx_url}" target="_blank" class="result-link">${publishResult.tx_url}</a>`;
        }
    } else if (publishResult && publishResult.error) {
        console.log('❌ Publish error:', publishResult.error);
        resultsHtml += `<br><br><em>⚠️ Publish error: ${publishResult.error}</em>`;
    } else {
        console.log('⚠️ No publish result or unexpected response:', publishResult);
    }

    document.getElementById('resultData').innerHTML = resultsHtml;
    document.getElementById('result').classList.add('show');
    document.getElementById('status').textContent = (publishResult && publishResult.status !== 'error') ? '✅ Complete' : '✅ Complete';

    btn.disabled = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
}
